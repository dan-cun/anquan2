name: secmind

x-backend-environment: &backend-environment
  SECMIND_APP_ENV: ${SECMIND_APP_ENV:-production}
  SECMIND_LOG_LEVEL: ${SECMIND_LOG_LEVEL:-INFO}
  SECMIND_DATA_DIR: /app/data
  SECMIND_LEDGER_DIR: /app/data/ledger
  SECMIND_DATABASE_URL: ${SECMIND_DATABASE_URL:?Set SECMIND_DATABASE_URL in the root .env file}
  SECMIND_CHECKPOINT_BACKEND: ${SECMIND_CHECKPOINT_BACKEND:-postgres}
  SECMIND_CHECKPOINT_DATABASE_URL: ${SECMIND_CHECKPOINT_DATABASE_URL:-${SECMIND_DATABASE_URL}}
  SECMIND_CHECKPOINT_NAMESPACE: ${SECMIND_CHECKPOINT_NAMESPACE:-secmind}
  SECMIND_PROJECTION_ENABLED: ${SECMIND_PROJECTION_ENABLED:-true}
  SECMIND_PROJECTION_REBUILD_ON_START: ${SECMIND_PROJECTION_REBUILD_ON_START:-false}
  SECMIND_GRAPHQL_PATH: ${SECMIND_GRAPHQL_PATH:-/graphql}
  SECMIND_GRAPHQL_SUBSCRIPTION_KEEPALIVE_SECONDS: ${SECMIND_GRAPHQL_SUBSCRIPTION_KEEPALIVE_SECONDS:-20}
  SECMIND_EVENT_STREAM_BATCH_SIZE: ${SECMIND_EVENT_STREAM_BATCH_SIZE:-500}
  SECMIND_EVENT_STREAM_POLL_INTERVAL_SECONDS: ${SECMIND_EVENT_STREAM_POLL_INTERVAL_SECONDS:-1.0}
  SECMIND_AGENT_MAX_PARALLEL: ${SECMIND_AGENT_MAX_PARALLEL:-8}
  SECMIND_AGENT_MAX_DELEGATION_DEPTH: ${SECMIND_AGENT_MAX_DELEGATION_DEPTH:-12}
  SECMIND_MCP_CONFIG_FILE: /app/config/mcp-servers.json
  SECMIND_MCP_CONNECT_TIMEOUT_SECONDS: ${SECMIND_MCP_CONNECT_TIMEOUT_SECONDS:-30}
  SECMIND_MCP_CALL_TIMEOUT_SECONDS: ${SECMIND_MCP_CALL_TIMEOUT_SECONDS:-300}
  SECMIND_MCP_REFRESH_INTERVAL_SECONDS: ${SECMIND_MCP_REFRESH_INTERVAL_SECONDS:-60}
  SECMIND_TOOL_GUIDE_FILE: ${SECMIND_TOOL_GUIDE_FILE:-/app/tools/tool-agent-guide.json}
  SECMIND_PROMPT_AUTO_RELOAD: ${SECMIND_PROMPT_AUTO_RELOAD:-false}
  SECMIND_PROMPT_WORKBOOK_PATH: ${SECMIND_PROMPT_WORKBOOK_PATH:-/app/config/native-prompts.xlsx}
  SECMIND_RUNTIME_INPUT_ROOT: /app/data/inputs
  SECMIND_RUNTIME_UPLOAD_ROOT: /app/data/uploads
  SECMIND_RUNTIME_RUN_ROOT: /app/data/runs
  SECMIND_RUNTIME_DEMO_MODE: ${SECMIND_RUNTIME_DEMO_MODE:-true}
  SECMIND_CORS_ORIGINS: ${SECMIND_CORS_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173}
  SECMIND_RATE_LIMIT_ENABLED: ${SECMIND_RATE_LIMIT_ENABLED:-true}
  SECMIND_RATE_LIMIT_REQUESTS: ${SECMIND_RATE_LIMIT_REQUESTS:-120}
  SECMIND_RATE_LIMIT_WINDOW_SECONDS: ${SECMIND_RATE_LIMIT_WINDOW_SECONDS:-60}
  SECMIND_API_KEY: ${SECMIND_API_KEY:-}
  SECMIND_LLM_EMBEDDING_MODEL: ${SECMIND_LLM_EMBEDDING_MODEL:-text-embedding-v3}
  SECMIND_LLM_MAX_ATTEMPTS: ${SECMIND_LLM_MAX_ATTEMPTS:-2}
  SECMIND_SOURCE_COMMIT: ${SECMIND_SOURCE_COMMIT:-unknown}
  SECMIND_IMAGE_DIGEST: ${SECMIND_IMAGE_DIGEST:-unknown}
  SECMIND_QDRANT_ENABLED: ${SECMIND_QDRANT_ENABLED:-false}
  SECMIND_QDRANT_URL: http://qdrant:6333
  SECMIND_QDRANT_COLLECTION: ${SECMIND_QDRANT_COLLECTION:-secmind_knowledge}
  SECMIND_QDRANT_MEMORY_COLLECTION: ${SECMIND_QDRANT_MEMORY_COLLECTION:-secmind_memory}
  SECMIND_QDRANT_VECTOR_SIZE: ${SECMIND_QDRANT_VECTOR_SIZE:-1024}

services:
  frontend:
    build:
      context: ./fronted
      dockerfile: Dockerfile
      additional_contexts:
        nginx_config: ./docker
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-/}
    image: secmind-frontend:${SECMIND_IMAGE_TAG:-local}
    ports:
      - "${SECMIND_FRONTEND_BIND:-127.0.0.1}:${SECMIND_FRONTEND_PORT:-5173}:8080"
    depends_on:
      backend:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
      - /var/cache/nginx:size=32m,mode=0755
      - /var/run:size=1m,mode=0755
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/healthz | grep -q '^ok$'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - edge

  backend:
    env_file:
      - path: ./benchmark/runtime.env
        required: false
      - path: ./config/model-public.env
        required: true
    build:
      context: ./secmind/backend
      dockerfile: ../../docker/backend.Dockerfile
      args:
        SECMIND_SOURCE_COMMIT: ${SECMIND_SOURCE_COMMIT:-unknown}
    image: ${SECMIND_BACKEND_IMAGE:-secmind-backend:local}
    environment: *backend-environment
    ports:
      - "${SECMIND_BACKEND_BIND:-127.0.0.1}:${SECMIND_BACKEND_PORT:-8000}:8000"
    volumes:
      - secmind_data:/app/data
      - ./outputs/019f783d-d94a-7f22-8a31-533c5bdca81e/PentAGI原生Prompt中英对比版.xlsx:/app/config/native-prompts.xlsx:ro
      - ./config/mcp-servers.json:/app/config/mcp-servers.json:ro
      - ./secmind/backend/tools/tool-agent-guide.json:/app/tools/tool-agent-guide.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      migrate:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - edge
      - data

  migrate:
    image: ${SECMIND_BACKEND_IMAGE:-secmind-backend:local}
    build:
      context: ./secmind/backend
      dockerfile: ../../docker/backend.Dockerfile
      args:
        SECMIND_SOURCE_COMMIT: ${SECMIND_SOURCE_COMMIT:-unknown}
    environment: *backend-environment
    command:
      - python
      - -m
      - alembic
      - -c
      - alembic/alembic.ini
      - upgrade
      - head
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: "no"
    networks:
      - data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-secmind}
      POSTGRES_USER: ${POSTGRES_USER:-secmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the root .env file}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /var/run/postgresql:size=16m,mode=2775
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    networks:
      - data

  qdrant:
    image: qdrant/qdrant:v1.13.2
    volumes:
      - qdrant_data:/qdrant/storage
      - qdrant_snapshots:/qdrant/snapshots
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "bash", "-c", ":> /dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped
    networks:
      - data

volumes:
  secmind_data:
  postgres_data:
  qdrant_data:
  qdrant_snapshots:

networks:
  edge:
  data:
    internal: true
