name: Security Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend lint, tests, and Python security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    defaults:
      run:
        working-directory: secmind/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: secmind/backend/pyproject.toml

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev,checkpoint,postgres,qdrant]"

      - name: Create report directory
        run: mkdir -p reports

      - name: Ruff lint
        run: python -m ruff check .

      - name: Compile check
        run: python -m compileall -q app agents tools llm ledger knowledge sandbox tests

      - name: Validate Alembic migrations
        env:
          SECMIND_DATABASE_URL: sqlite:///./reports/ci-migrations.db
        run: |
          python -m alembic -c alembic/alembic.ini upgrade head
          python -m alembic -c alembic/alembic.ini check

      - name: Unit tests
        if: always()
        run: python -m pytest -q --junitxml=reports/pytest.xml

      - name: Bandit static security scan
        if: always()
        run: >-
          python -m bandit -r app agents tools ledger llm knowledge sandbox
          -f json -o reports/bandit.json -q

      - name: Python dependency audit
        if: always()
        run: >-
          python -m pip_audit --progress-spinner off
          --format json --output reports/pip-audit.json

      - name: Agent security audit
        if: always()
        run: >-
          python -m agent_audit scan . --format sarif
          --output reports/agent-audit.sarif --fail-on high --no-color

      - name: Upload agent-audit SARIF
        if: always() && hashFiles('secmind/backend/reports/agent-audit.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: secmind/backend/reports/agent-audit.sarif
          category: agent-audit

      - name: Upload backend reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-quality-and-security-reports
          path: secmind/backend/reports/
          if-no-files-found: warn
          retention-days: 30

  frontend:
    name: Frontend build and npm audit (${{ matrix.app }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        app:
          - fronted
          - frontend
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint if configured
        run: npm run lint --if-present

      - name: Build
        run: npm run build

      - name: Production dependency audit
        run: npm audit --audit-level=high --omit=dev --registry=https://registry.npmjs.org

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          license-check: true

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language:
          - python
          - javascript-typescript
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  container:
    name: Container build and vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compose configuration
        env:
          POSTGRES_PASSWORD: ci-url-safe-password
          SECMIND_DATABASE_URL: postgresql+psycopg://secmind:ci-url-safe-password@postgres:5432/secmind
        run: docker compose config --quiet

      - name: Build backend image
        run: >-
          docker build -f docker/backend.Dockerfile
          -t secmind-backend:${{ github.sha }} secmind/backend

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.32.0
        with:
          image-ref: secmind-backend:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
