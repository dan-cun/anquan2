name: Backend

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "codex/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: secmind/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest

      - name: Agent audit
        run: |
          python -m pip install agent-audit
          agent-audit scan . --fail-on high --format text

