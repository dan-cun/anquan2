<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AULA Robot Hero</title>
    <style>
      html,
      body {
        background: #101214;
      }

      .route-transition-cover {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #030405;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.55s ease;
      }

      html.route-transition-pending .route-transition-cover {
        opacity: 1;
        pointer-events: auto;
      }
    </style>
    <script>
      if (
        window.location.pathname.startsWith('/workbench')
        && new URLSearchParams(window.location.search).get('source') === 'feature-entry'
      ) {
        document.documentElement.classList.add('route-transition-pending')
      }
    </script>
  </head>
  <body>
    <div class="route-transition-cover" aria-hidden="true"></div>
    <main id="app">
      <section class="hero-shell" aria-label="AULA robot hero">
        <div id="hero-stage" class="hero-stage"></div>
        <div id="hero-loading" class="hero-loading">Loading 3D model</div>
        <div id="coordinate-tooltip" class="coordinate-tooltip" aria-hidden="true"></div>
        <div id="feature-label" class="feature-label" aria-hidden="true">
          &#x529F;&#x80FD;&#x5165;&#x53E3;
        </div>
        <div id="transition-overlay" class="transition-overlay" aria-hidden="true"></div>
      </section>
    </main>
    <script type="module" src="/src/bootstrap.js"></script>
  </body>
</html>
