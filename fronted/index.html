<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AULA Robot Hero</title>
  </head>
  <body>
    <main id="app">
      <section class="hero-shell" aria-label="AULA robot hero">
        <div id="hero-stage" class="hero-stage"></div>
        <div id="hero-loading" class="hero-loading">Loading 3D model</div>
        <div id="coordinate-tooltip" class="coordinate-tooltip" aria-hidden="true"></div>
        <div id="feature-label" class="feature-label" aria-hidden="true">
          &#x529F;&#x80FD;&#x5165;&#x53E3;
        </div>
        <div id="transition-overlay" class="transition-overlay" aria-hidden="true"></div>
        <div class="control-stack">
          <aside class="coordinate-panel" aria-label="坐标采集记录">
            <div class="coordinate-panel__header">
              <div>
                <h2>坐标采集</h2>
                <span id="coordinate-count">0 个记录</span>
              </div>
              <div class="coordinate-panel__actions">
                <button id="export-coordinates" type="button">导出</button>
                <button id="clear-coordinates" type="button">清空</button>
              </div>
            </div>
            <ol id="coordinate-history" class="coordinate-history"></ol>
          </aside>
          <section class="particle-panel" aria-label="粒子控制">
            <div class="particle-panel__label">
              <label for="particle-size">粒子大小</label>
              <output id="particle-size-value" for="particle-size">10.0</output>
            </div>
            <input
              id="particle-size"
              type="range"
              min="4"
              max="22"
              step="0.5"
              value="10"
            />
          </section>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
